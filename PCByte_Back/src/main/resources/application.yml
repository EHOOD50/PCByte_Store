spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/techstore
    username: postgres
    password: admin123

  data:
    web:
      page-serialization-mode: via-dto

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

mercadopago:
  access:
    token: ${MP_ACCESS_TOKEN}

# 🚩 CORRECCIÓN APLICADA: Un solo 'app' y variables alineadas
app:
  base-url: https://unrarefied-unpervasive-pandora.ngrok-free.dev
  frontend-url: http://192.168.100.226:5173
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}